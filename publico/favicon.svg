<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc66"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Fundo -->
  <rect width="64" height="64" rx="14" fill="#0a0e1a"/>
  <!-- Corpo da cobra em S -->
  <path d="M44 14 C44 14 48 14 48 20 C48 28 18 22 18 32 C18 42 48 36 48 44 C48 50 44 50 44 50"
        stroke="url(#g)" stroke-width="8" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <!-- Olho esquerdo -->
  <circle cx="36" cy="14" r="2.5" fill="#fff"/>
  <circle cx="36" cy="14" r="1" fill="#111"/>
  <!-- Olho direito -->
  <circle cx="44" cy="14" r="2.5" fill="#fff"/>
  <circle cx="44" cy="14" r="1" fill="#111"/>
  <!-- Lingua bifurcada -->
  <line x1="48" y1="50" x2="54" y2="54" stroke="#ff2244" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="48" y1="50" x2="54" y2="46" stroke="#ff2244" stroke-width="1.8" stroke-linecap="round"/>
</svg>
